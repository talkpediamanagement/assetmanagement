    <style>
        /* Corporate White & Glassmorphism Theme */
        :root {
            --primary-bg: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            --text-main: #1e293b;
            --brand-color: #0ea5e9;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        /* Sidebar & Layout */
        #sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 50;
            transition: transform 0.3s ease;
        }

        #main-content {
            margin-left: 260px;
            min-height: 100vh;
            padding: 2rem;
            transition: margin-left 0.3s ease;
        }

        /* Bottom Nav (Mobile) */
        #bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 50;
        }

        .menu-item {
            cursor: pointer;
            transition: all 0.2s;
        }
        .menu-item:hover, .menu-item.active {
            background-color: #e0f2fe;
            color: var(--brand-color);
            border-right: 4px solid var(--brand-color);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); }
            #main-content { margin-left: 0; padding: 1rem; padding-bottom: 80px; }
            #bottom-nav { display: flex; }
        }

        /* Loader */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--brand-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
     
      
    </style>
</head>
<body>

    <script type="module">
        // KONFIGURASI APLIKASI
        const IS_PREVIEW = false; // HARUS FALSE AGAR FIREBASE BERJALAN

        // PASTE FIREBASE CONFIG ANDA DI SINI
        const firebaseConfig = {
            apiKey: "AIzaSyAqAvtxyap_d_q_C0Fz0hmUX0uciXnmqk8",
            authDomain: "management-asset-system.firebaseapp.com",

        };

        // Firebase Imports (Modular SDK)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        let app, auth, db;
        if (!IS_PREVIEW) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        // ==========================================
        // STATE MANAGEMENT & MOCK DATABASE
        // ==========================================
        // MOCK_DB USERS SUDAH DIHAPUS TOTAL UNTUK KEAMANAN
        const AppState = { currentUser: null, currentView: 'dashboard', data: { assets: [], software: [], contracts: [], vendors: [], users: [], loans: [], requests: [] } };

        const PROVINCES = [
            "Aceh", "Sumatera Utara", "Sumatera Barat", "Riau", "Kepulauan Riau", "Jambi", "Bengkulu", 
            "Sumatera Selatan", "Kepulauan Bangka Belitung", "Lampung", "Banten", "DKI Jakarta", 
            "Jawa Barat", "Jawa Tengah", "DI Yogyakarta", "Jawa Timur", "Bali", "Nusa Tenggara Barat", 
            "Nusa Tenggara Timur", "Kalimantan Barat", "Kalimantan Tengah", "Kalimantan Selatan", 
            "Kalimantan Timur", "Kalimantan Utara", "Sulawesi Utara", "Gorontalo", "Sulawesi Tengah", 
            "Sulawesi Barat", "Sulawesi Selatan", "Sulawesi Tenggara", "Maluku", "Maluku Utara", 
            "Papua Barat", "Papua", "Papua Selatan", "Papua Tengah", "Papua Pegunungan", "Nasional"
        ];

        const MOCK_DB = {
            assets: [
                { id: 'A001', assetTag: 'AST-LPT-001', sn: 'SN123456', brand: 'Dell', model: 'Latitude 7420', category: 'Laptop', lokasi: 'DKI Jakarta', ownerId: 'U002', status: 'Digunakan', warrantyDate: '2026-01-15' },
                { id: 'A002', assetTag: 'AST-SRV-001', sn: 'SN987654', brand: 'HP', model: 'ProLiant DL380', category: 'Server', lokasi: 'Sumatera Utara', ownerId: null, status: 'Tersedia', warrantyDate: '2025-05-10' },
                { id: 'A003', assetTag: 'AST-PRN-001', sn: 'SN112233', brand: 'Epson', model: 'L3150', category: 'Printer', lokasi: 'DKI Jakarta', ownerId: null, status: 'Tersedia', warrantyDate: '2025-02-01' }
            ],
            software: [
                { id: 'S001', name: 'Microsoft Office 365', vendor: 'Microsoft', licenseKey: 'Volume License', totalSeats: 100, activeSeats: 45, expiryDate: '2027-12-31', compliance: 'Compliant' },
                { id: 'S002', name: 'AutoCAD 2024', vendor: 'Autodesk', licenseKey: 'ABC-123-XYZ', totalSeats: 5, activeSeats: 5, expiryDate: '2025-06-30', compliance: 'Max Capacity' }
            ],
            vendors: [
                { id: 'V001', name: 'Dell Indonesia', pic: 'Budi Santoso', email: 'budi@dell.co.id', phone: '021-5551234', contracts: 'C001' }
            ],
            contracts: [
                { id: 'C001', vendor: 'Dell Indonesia', value: 'Rp 150.000.000', startDate: '2023-01-01', endDate: '2026-01-01', reminder: '2025-12-01' }
            ],
            loans: [
                { id: 'L001', assetTag: 'AST-PRJ-001', itemName: 'Projector Epson', borrower: 'U003', startDate: '2024-10-01', endDate: '2024-10-05', status: 'Selesai' }
            ],
            requests: [
                { id: 'R001', type: 'Permintaan Peminjaman', description: 'Pinjam Laptop Cadangan', userId: 'U003', status: 'Pending', date: '2024-10-25' }
            ]
        };

        // ==========================================
        // UTILITY FUNCTIONS (UTUH)
        // ==========================================
        const showToast = (message, type = 'success') => {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-500' : (type === 'error' ? 'bg-red-500' : 'bg-sky-500');
            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg text-sm font-medium transition-all transform translate-x-full`;
            toast.innerHTML = `<div class="flex items-center gap-2"><i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i> ${message}</div>`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full'); setTimeout(() => toast.remove(), 300); }, 3000);
        };

        const showLoader = (text = 'Memproses...') => { document.getElementById('loader-text').innerText = text; document.getElementById('global-loader').classList.remove('hidden'); };
        const hideLoader = () => document.getElementById('global-loader').classList.add('hidden');

        window.sortTableDOM = (thElement, colIndex) => {
            const table = thElement.closest('table');
            const tbody = table.querySelector('tbody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            if(rows.length === 1 && rows[0].cells.length === 1) return;

            const isAsc = thElement.classList.contains('asc');
            table.querySelectorAll('th').forEach(th => { 
                th.classList.remove('asc', 'desc'); 
                const icon = th.querySelector('i.fa-sort, i.fa-sort-up, i.fa-sort-down');
                if(icon) icon.className = 'fa-solid fa-sort text-gray-400 ml-1'; 
            });
            
            if (isAsc) {
                thElement.classList.add('desc');
                thElement.querySelector('i').className = 'fa-solid fa-sort-down text-sky-600 ml-1';
            } else {
                thElement.classList.add('asc');
                thElement.querySelector('i').className = 'fa-solid fa-sort-up text-sky-600 ml-1';
            }

            const direction = isAsc ? -1 : 1;
            rows.sort((a, b) => {
                const aText = a.cells[colIndex].innerText.trim();
                const bText = b.cells[colIndex].innerText.trim();
                const aNum = parseFloat(aText.replace(/[^0-9.-]+/g,""));
                const bNum = parseFloat(bText.replace(/[^0-9.-]+/g,""));
                if (!isNaN(aNum) && !isNaN(bNum) && aText.match(/^[0-9.,Rp\s]+$/)) return (aNum - bNum) * direction;
                return aText.localeCompare(bText) * direction;
            });
            tbody.append(...rows);
        };

        // ==========================================
        // AUTO SETUP DATABASE (TIDAK MENGISI USER)
        // ==========================================
        const autoSetupDatabase = async () => {
            if (IS_PREVIEW) return;
            try {
                const assetsRef = collection(db, 'assets');
                const assetsSnap = await getDocs(query(assetsRef));
                if (assetsSnap.empty) {
                    showLoader('Inisialisasi Database Enterprise...');
                    const collectionsToSetup = ['assets', 'software', 'vendors', 'contracts', 'loans', 'requests'];
                    for (const collName of collectionsToSetup) {
                        for (const item of MOCK_DB[collName]) await setDoc(doc(db, collName, item.id), item);
                    }
                    showToast("Database Enterprise Siap Digunakan!", "success");
                }
            } catch (error) { console.error("Setup Error:", error); } finally { hideLoader(); }
        };

        // ==========================================
        // DATA LAYER (UTUH)
        // ==========================================
        const fetchData = async (collectionName) => {
            if (IS_PREVIEW) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        let result = MOCK_DB[collectionName] ? [...MOCK_DB[collectionName]] : [];
                        if (AppState.currentUser && AppState.currentUser.role === 'Admin Area') {
                            if (collectionName === 'assets' || collectionName === 'users') {
                                result = result.filter(item => item.lokasi === AppState.currentUser.area || item.area === AppState.currentUser.area);
                            }
                        }
                        AppState.data[collectionName] = result;
                        resolve(result);
                    }, 300);
                });
            } else {
                const q = (AppState.currentUser.role === 'Admin Area' && (collectionName === 'assets' || collectionName === 'users')) 
                            ? query(collection(db, collectionName), where(collectionName === 'assets' ? 'lokasi' : 'area', '==', AppState.currentUser.area))
                            : query(collection(db, collectionName));
                const snap = await getDocs(q);
                const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                AppState.data[collectionName] = data;
                return data;
            }
        };

        const saveData = async (collectionName, data, id = null) => {
            if (IS_PREVIEW) {
                if (!MOCK_DB[collectionName]) MOCK_DB[collectionName] = [];
                if (id) {
                    const idx = MOCK_DB[collectionName].findIndex(i => i.id === id);
                    if(idx > -1) MOCK_DB[collectionName][idx] = { ...data, id };
                } else {
                    data.id = 'ID' + Math.floor(Math.random() * 10000);
                    MOCK_DB[collectionName].push(data);
                }
                return true;
            } else {
                if (id) await updateDoc(doc(db, collectionName, id), data);
                else await addDoc(collection(db, collectionName), data);
                return true;
            }
        };

        const deleteData = async (collectionName, id) => {
            if (IS_PREVIEW) { MOCK_DB[collectionName] = MOCK_DB[collectionName].filter(i => i.id !== id); return true; } 
            else { await deleteDoc(doc(db, collectionName, id)); return true; }
        };

        // ==========================================
        // AUTHENTICATION LOGIC (SSO ENTERPRISE - PERUBAHAN UTAMA)
        // ==========================================
        const handleUnifiedLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.toLowerCase().trim();
            const password = document.getElementById('login-password').value;
            
            showLoader('Otentikasi Akun Corporate...');

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const firebaseUser = userCredential.user;

                const userDocRef = doc(db, 'users', firebaseUser.uid);
                const userDocSnap = await getDoc(userDocRef);

                if (userDocSnap.exists()) {
                    const userData = userDocSnap.data();
                    
                    AppState.currentUser = {
                        id: firebaseUser.uid,
                        email: firebaseUser.email,
                        nama: userData.nama,
                        role: userData.role,
                        area: userData.area
                    };
                    initApp();
                } else {
                    await signOut(auth);
                    throw new Error("Profil pengguna tidak ditemukan di dalam sistem database.");
                }
            } catch (error) {
                let msg = error.message;
                if (error.code === 'auth/invalid-credential') msg = "Email atau Password Salah.";
                showToast('Akses Ditolak: ' + msg, 'error');
            } finally {
                hideLoader();
            }
        };

        const handleLogout = async () => {
            showLoader('Keluar sistem...');
            if (!IS_PREVIEW && auth) await signOut(auth);
            AppState.currentUser = null;
            document.getElementById('app-structure').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('form-login-unified').reset();
            hideLoader();
        };

        document.getElementById('form-login-unified').addEventListener('submit', handleUnifiedLogin);
        document.getElementById('btn-logout').addEventListener('click', handleLogout);

        // ==========================================
        // UI & NAVIGATION LOGIC (UTUH)
        // ==========================================
        const MENUS = {
            admin: [
                { id: 'dashboard', label: 'Dashboard', icon: 'fa-chart-pie' },
                { id: 'assets', label: 'Asset Management', icon: 'fa-laptop' },
                { id: 'software', label: 'Software & License', icon: 'fa-compact-disc' },
                { id: 'contracts', label: 'Contract Management', icon: 'fa-file-signature' },
                { id: 'vendors', label: 'Vendor Management', icon: 'fa-building' },
                { id: 'warranty', label: 'Warranty Management', icon: 'fa-shield-halved' },
                { id: 'loans', label: 'Loan Management', icon: 'fa-handshake' },
                { id: 'users', label: 'User Management', icon: 'fa-users' },
                { id: 'reports', label: 'Reporting', icon: 'fa-file-excel' }
            ],
            user: [
                { id: 'user_dashboard', label: 'Aset Saya', icon: 'fa-box' },
                { id: 'user_requests', label: 'Pusat Permintaan', icon: 'fa-paper-plane' }
            ]
        };

        const initApp = async () => {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-structure').classList.remove('hidden');
            document.getElementById('auth-name').innerText = AppState.currentUser.nama;
            document.getElementById('auth-role').innerText = `${AppState.currentUser.role} ${AppState.currentUser.area === 'Nasional' ? '' : '- ' + AppState.currentUser.area}`;
            buildNavigation();
            
            if(!IS_PREVIEW) await autoSetupDatabase();

            const defaultView = AppState.currentUser.role === 'User' ? 'user_dashboard' : 'dashboard';
            switchView(defaultView);
        };

        const buildNavigation = () => {
            const navContainer = document.getElementById('nav-container');
            const bottomNav = document.getElementById('bottom-nav');
            navContainer.innerHTML = ''; bottomNav.innerHTML = '';
            const menus = AppState.currentUser.role === 'User' ? MENUS.user : MENUS.admin;
            menus.forEach(menu => {
                const btn = document.createElement('div');
                btn.className = `menu-item px-6 py-3 flex items-center gap-3 text-sm font-medium text-gray-600 nav-${menu.id}`;
                btn.innerHTML = `<i class="fa-solid ${menu.icon} w-5 text-center"></i> ${menu.label}`;
                btn.onclick = () => switchView(menu.id);
                navContainer.appendChild(btn);

                const bBtn = document.createElement('div');
                bBtn.className = `menu-item flex-1 py-2 flex flex-col items-center justify-center gap-1 nav-${menu.id}`;
                bBtn.innerHTML = `<i class="fa-solid ${menu.icon} text-lg"></i><span class="text-[10px] text-center">${menu.label.split(' ')[0]}</span>`;
                bBtn.onclick = () => switchView(menu.id);
                bottomNav.appendChild(bBtn);
            });
        };

        const switchView = async (viewId) => {
            showLoader();
            AppState.currentView = viewId;
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll(`.nav-${viewId}`).forEach(el => el.classList.add('active'));

            const container = document.getElementById('view-container');
            const title = document.getElementById('page-title');
            const subtitle = document.getElementById('page-subtitle');
            const headerActions = document.getElementById('header-actions');
            container.innerHTML = ''; headerActions.innerHTML = '';

            try {
                switch(viewId) {
                    case 'dashboard':
                        title.innerText = 'Dashboard Utama'; subtitle.innerText = 'Ringkasan Sistem Enterprise';
                        await renderAdminDashboard(container); break;
                    case 'assets':
                        title.innerText = 'Asset Management'; subtitle.innerText = 'Inventaris Hardware';
                        headerActions.innerHTML = `<button onclick="openModal('assets')" class="bg-sky-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-sky-700 transition"><i class="fa-solid fa-plus mr-1"></i> Tambah Asset</button>`;
                        await renderTable(container, 'assets', ['Asset Tag', 'Tipe', 'Brand/Model', 'SN', 'Lokasi', 'Status']); break;

                title.innerText = data ? 'Edit Asset' : 'Tambah Asset Baru';
                html += `
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs font-medium">Asset Tag</label><input type="text" name="assetTag" value="${data?.assetTag||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-medium">Serial Number</label><input type="text" name="sn" value="${data?.sn||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-medium">Kategori</label>
                            <select name="category" class="w-full mt-1 px-3 py-2 border rounded-lg">
                                <option value="Laptop" ${data?.category==='Laptop'?'selected':''}>Laptop</option>
                                <option value="PC Desktop" ${data?.category==='PC Desktop'?'selected':''}>PC Desktop</option>
                                <option value="Server" ${data?.category==='Server'?'selected':''}>Server</option>
                                <option value="Printer" ${data?.category==='Printer'?'selected':''}>Printer</option>
                            </select></div>
                        <div><label class="block text-xs font-medium">Brand</label><input type="text" name="brand" value="${data?.brand||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-medium">Model</label><input type="text" name="model" value="${data?.model||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-medium">Lokasi (Provinsi)</label>
                            <select name="lokasi" class="w-full mt-1 px-3 py-2 border rounded-lg" ${AppState.currentUser.role === 'Admin Area' ? 'readonly' : ''}>
                                ${PROVINCES.map(p => `<option value="${p}" ${data?.lokasi === p || (AppState.currentUser.role === 'Admin Area' && AppState.currentUser.area === p) ? 'selected' : ''}>${p}</option>`).join('')}
                            </select></div>
                        <div><label class="block text-xs font-medium">Tanggal Garansi</label><input type="date" name="warrantyDate" value="${data?.warrantyDate||''}" class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-medium">Status</label>
                            <select name="status" class="w-full mt-1 px-3 py-2 border rounded-lg">
                                <option value="Tersedia" ${data?.status==='Tersedia'?'selected':''}>Tersedia</option>
                                <option value="Digunakan" ${data?.status==='Digunakan'?'selected':''}>Digunakan</option>
                                <option value="Maintenance" ${data?.status==='Maintenance'?'selected':''}>Maintenance</option>
                            </select></div>
                    </div>`;
            } else if (type === 'software') {
                title.innerText = data ? 'Edit Lisensi Software' : 'Tambah Lisensi Software';
                html += `
                    <div><label class="block text-xs font-medium">Nama Software</label><input type="text" name="name" value="${data?.name||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                    <div><label class="block text-xs font-medium">Vendor</label><input type="text" name="vendor" value="${data?.vendor||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                    <div><label class="block text-xs font-medium">License Key</label><input type="text" name="licenseKey" value="${data?.licenseKey||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs font-medium">Total Seats</label><input type="number" name="totalSeats" value="${data?.totalSeats||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-medium">Expired Date</label><input type="date" name="expiryDate" value="${data?.expiryDate||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                    </div>
                    <div><label class="block text-xs font-medium">Compliance</label>
                        <select name="compliance" class="w-full mt-1 px-3 py-2 border rounded-lg">
                            <option value="Compliant" ${data?.compliance==='Compliant'?'selected':''}>Compliant</option>
                            <option value="Max Capacity" ${data?.compliance==='Max Capacity'?'selected':''}>Max Capacity</option>
                            <option value="Expired" ${data?.compliance==='Expired'?'selected':''}>Expired</option>
                        </select></div>`;
            } else if (type === 'contracts') {
                title.innerText = data ? 'Edit Kontrak' : 'Tambah Kontrak Vendor';
                html += `
                    <div><label class="block text-xs font-medium">Vendor / Provider</label><input type="text" name="vendor" value="${data?.vendor||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                    <div><label class="block text-xs font-medium">Nilai Kontrak</label><input type="text" name="value" value="${data?.value||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg" placeholder="Contoh: Rp 50.000.000"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs font-medium">Start Date</label><input type="date" name="startDate" value="${data?.startDate||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-medium">End Date</label><input type="date" name="endDate" value="${data?.endDate||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                    </div>
                    <div><label class="block text-xs font-medium">Tanggal Reminder</label><input type="date" name="reminder" value="${data?.reminder||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>`;
            } else if (type === 'vendors') {
                title.innerText = data ? 'Edit Vendor' : 'Tambah Vendor Baru';
                html += `
                    <div><label class="block text-xs font-medium">Nama Vendor</label><input type="text" name="name" value="${data?.name||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                    <div><label class="block text-xs font-medium">PIC (Person In Charge)</label><input type="text" name="pic" value="${data?.pic||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs font-medium">Email</label><input type="email" name="email" value="${data?.email||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-medium">Telepon</label><input type="text" name="phone" value="${data?.phone||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                    </div>
                    <div><label class="block text-xs font-medium">ID Kontrak (Opsional)</label><input type="text" name="contracts" value="${data?.contracts||''}" class="w-full mt-1 px-3 py-2 border rounded-lg"></div>`;
            } else if (type === 'loans') {
                title.innerText = data ? 'Edit Peminjaman' : 'Form Peminjaman Aset';
                html += `
                    <div><label class="block text-xs font-medium">Asset Tag</label><input type="text" name="assetTag" value="${data?.assetTag||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                    <div><label class="block text-xs font-medium">Nama Barang</label><input type="text" name="itemName" value="${data?.itemName||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                    <div><label class="block text-xs font-medium">ID Peminjam (NIK)</label><input type="text" name="borrower" value="${data?.borrower||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs font-medium">Tanggal Pinjam</label><input type="date" name="startDate" value="${data?.startDate||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-medium">Batas Kembali</label><input type="date" name="endDate" value="${data?.endDate||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                    </div>
                    <div><label class="block text-xs font-medium">Status</label>
                        <select name="status" class="w-full mt-1 px-3 py-2 border rounded-lg">
                            <option value="Aktif" ${data?.status==='Aktif'?'selected':''}>Aktif</option>
                            <option value="Selesai" ${data?.status==='Selesai'?'selected':''}>Selesai</option>
                        </select></div>`;
            } else if (type === 'users') {
                title.innerText = data ? 'Edit Data Pengguna' : 'Tambah Pengguna Baru';
                html += `
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs font-medium">NIK / ID Karyawan</label><input type="text" name="nik" value="${data?.nik||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-medium">Nama Lengkap</label><input type="text" name="nama" value="${data?.nama||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-medium">Email (Khusus Akses Admin)</label><input type="email" name="email" value="${data?.email||''}" class="w-full mt-1 px-3 py-2 border rounded-lg" placeholder="Ketik email login..."></div>
                        <div><label class="block text-xs font-medium">Password Login</label><input type="text" name="pin" value="${data?.pin||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-medium">Departemen</label><input type="text" name="departemen" value="${data?.departemen||''}" required class="w-full mt-1 px-3 py-2 border rounded-lg"></div>
                        <div><label class="block text-xs font-medium">Role Akses</label>
                            <select name="role" class="w-full mt-1 px-3 py-2 border rounded-lg">
                                <option value="User" ${data?.role==='User'?'selected':''}>User (Staff Biasa)</option>
                                <option value="Admin Area" ${data?.role==='Admin Area'?'selected':''}>Admin Area</option>
                                <option value="SuperAdmin" ${data?.role==='SuperAdmin'?'selected':''}>SuperAdmin</option>
                            </select></div>
                        <div class="col-span-2"><label class="block text-xs font-medium">Lokasi/Cakupan (Provinsi / Nasional)</label>
                            <select name="area" class="w-full mt-1 px-3 py-2 border rounded-lg">
                                ${PROVINCES.map(p => `<option value="${p}" ${data?.area === p ? 'selected' : ''}>${p}</option>`).join('')}
                            </select></div>
                    </div>`;
            }

            html += `</form>`;
            body.innerHTML = html;
            
            document.getElementById('modal-submit').onclick = async () => {
                const form = document.getElementById('dynamic-form');
                if(!form.checkValidity()) { form.reportValidity(); return; }
                const formData = new FormData(form);
                const obj = Object.fromEntries(formData.entries());
                
                if(type === 'users' && obj.email) obj.email = obj.email.toLowerCase().trim();

                showLoader('Menyimpan...');
                await saveData(type, obj, data?.id);
                hideLoader(); closeModal(); switchView(type);
                showToast('Data berhasil disimpan');
            };
        };

        window.openRequestForm = (reqType) => {
            openModal('requests_fake'); // Open modal visual shell
            document.getElementById('modal-title').innerText = 'Form ' + reqType;
            document.getElementById('modal-body').innerHTML = `
                <form id="dynamic-form" class="space-y-4">
                    <div><label class="block text-sm font-medium">Tipe Request</label><input type="text" name="type" value="${reqType}" readonly class="w-full mt-1 px-3 py-2 border bg-gray-50 rounded-lg"></div>
                    <div><label class="block text-sm font-medium">Deskripsi Lengkap / Alasan</label><textarea name="description" rows="4" required class="w-full mt-1 px-3 py-2 border rounded-lg" placeholder="Jelaskan detail..."></textarea></div>
                </form>
            `;
            document.getElementById('modal-submit').onclick = async () => {
                const form = document.getElementById('dynamic-form');
                if(!form.checkValidity()) { form.reportValidity(); return; }
                const obj = Object.fromEntries(new FormData(form).entries());
                obj.userId = AppState.currentUser.id; obj.status = 'Pending'; obj.date = new Date().toISOString().split('T')[0];
                showLoader(); await saveData('requests', obj); hideLoader(); closeModal(); switchView('user_requests'); showToast('Permintaan dikirim!');
            };
        };

        const closeModal = () => document.getElementById('modal-container').classList.add('hidden');
        document.getElementById('modal-close').addEventListener('click', closeModal);
        document.getElementById('modal-cancel').addEventListener('click', closeModal);

        window.deleteRow = async (collectionName, id) => {
            if(confirm('Yakin menghapus data ini?')) { showLoader(); await deleteData(collectionName, id); hideLoader(); switchView(collectionName); showToast('Data dihapus'); }
        };
        window.editData = async (collectionName, id) => {
            const item = AppState.data[collectionName].find(i => i.id === id);
            if(item) openModal(collectionName, item);
        };
        window.filterTable = (input) => {
            const filter = input.value.toLowerCase();
            document.querySelectorAll('.data-table tbody tr').forEach(row => { row.style.display = row.innerText.toLowerCase().includes(filter) ? '' : 'none'; });
        };
        
        window.exportData = async (collectionName, format) => {
            const data = await fetchData(collectionName);
            if(data.length === 0) return showToast('Tidak ada data', 'error');
            if(format === 'excel') {
                const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Report"); XLSX.writeFile(wb, `${collectionName}_report.xlsx`);
            } else if (format === 'pdf') {
                const doc = new jspdf.jsPDF(); const headers = Object.keys(data[0]).filter(k => k !== 'id'); const rows = data.map(obj => headers.map(h => obj[h] || '-'));
                doc.text(`Laporan ${collectionName.toUpperCase()}`, 14, 15); doc.autoTable({ startY: 20, head: [headers], body: rows, styles: { fontSize: 8 }}); doc.save(`${collectionName}_report.pdf`);
            }
            showToast('Laporan diunduh');
        };

        const setupPWA = () => {
            const manifestData = { name: "Enterprise Asset System", short_name: "EAS", display: "standalone", background_color: "#ffffff", theme_color: "#0ea5e9", icons: [{ src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0MCIgZmlsbD0iIzBlYTVlOSIvPjwvc3ZnPg==", sizes: "192x192", type: "image/svg+xml" }]};
            const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
            document.head.insertAdjacentHTML('beforeend', `<link rel="manifest" href="${URL.createObjectURL(blob)}">`);
            const swCode = `self.addEventListener('install', (e) => self.skipWaiting()); self.addEventListener('activate', (e) => self.clients.claim()); self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });`;
            if ('serviceWorker' in navigator) navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode], { type: 'application/javascript' }))).catch(()=>{});
        };

        setupPWA();
        document.getElementById('login-screen').classList.remove('hidden');

    </script>
</body>
</html>
